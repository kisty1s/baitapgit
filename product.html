<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Product Page</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0F172A;
color:white;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
font-size:32px;
}

.container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.product{
background:#1E293B;
border-radius:12px;
overflow:hidden;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.product:hover{
transform:translateY(-8px);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

.product-info{
padding:15px;
}

.product-name{
font-size:20px;
margin-bottom:10px;
}

.product-price{
color:#38BDF8;
font-weight:bold;
margin-bottom:15px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#38BDF8;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#0EA5E9;
}

.cart{
position:fixed;
top:20px;
right:20px;
background:#1E293B;
padding:12px 20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

</style>

</head>

<body>

<div class="cart">
🛒 Cart: <span id="cartCount">0</span>
</div>

<h1>Danh sách sản phẩm</h1>

<div class="container" id="productList"></div>

<script>

const products=[
{
id:1,
name:"Laptop Gaming",
price:25000000,
image:"https://picsum.photos/400/300?1"
},
{
id:2,
name:"Chuột Gaming",
price:500000,
image:"https://picsum.photos/400/300?2"
},
{
id:3,
name:"Bàn phím cơ",
price:1200000,
image:"https://picsum.photos/400/300?3"
},
{
id:4,
name:"Tai nghe Gaming",
price:900000,
image:"https://picsum.photos/400/300?4"
},
{
id:5,
name:"Màn hình 144Hz",
price:4500000,
image:"https://picsum.photos/400/300?5"
},
{
id:6,
name:"Ghế Gaming",
price:3500000,
image:"https://picsum.photos/400/300?6"
}
];

let cart=0;

function loadProducts(){

const container=document.getElementById("productList");

products.forEach(p=>{

const div=document.createElement("div");
div.className="product";

div.innerHTML=`
<img src="${p.image}">
<div class="product-info">
<div class="product-name">${p.name}</div>
<div class="product-price">${p.price.toLocaleString()} VNĐ</div>
<button onclick="addToCart()">Thêm vào giỏ</button>
</div>
`;

container.appendChild(div);

});

}

function addToCart(){
cart++;
document.getElementById("cartCount").innerText=cart;
}

loadProducts();

</script>

</body>
</html>
