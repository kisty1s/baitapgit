<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Product Page</title>

<style>
body{
    font-family: Arial;
    background:#0F172A;
    color:white;
    text-align:center;
}

.container{
    width:800px;
    margin:auto;
}

.product{
    background:#1E293B;
    padding:20px;
    margin:15px;
    border-radius:10px;
}

button{
    padding:8px 15px;
    border:none;
    border-radius:6px;
    background:#38BDF8;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>Danh sách sản phẩm</h1>

<div class="container" id="productList"></div>

<script>

const products = [
    {
        id:1,
        name:"Laptop Gaming",
        price:25000000
    },
    {
        id:2,
        name:"Chuột Gaming",
        price:500000
    },
    {
        id:3,
        name:"Bàn phím cơ",
        price:1200000
    }
];

function loadProducts(){

    const container = document.getElementById("productList");

    products.forEach(product => {

        const div = document.createElement("div");
        div.className = "product";

        div.innerHTML = `
            <h2>${product.name}</h2>
            <p>Giá: ${product.price.toLocaleString()} VNĐ</p>
            <button onclick="addToCart(${product.id})">Thêm vào giỏ</button>
        `;

        container.appendChild(div);

    });

}

function addToCart(id){
    alert("Đã thêm sản phẩm ID: " + id + " vào giỏ hàng");
}

loadProducts();

</script>

</body>
</html>
