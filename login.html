<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
}

.container{
    width:300px;
    margin:100px auto;
    padding:20px;
    background:white;
    border-radius:5px;
    text-align:center;
}

input{
    width:90%;
    padding:8px;
    margin:8px 0;
}

button{
    padding:8px 15px;
    background:blue;
    color:white;
    border:none;
    cursor:pointer;
}

#message{
    margin-top:10px;
    color:red;
}
</style>

</head>

<body>

<div class="container">

<h2>Login System</h2>

<input type="text" id="username" placeholder="Enter username">

<input type="password" id="password" placeholder="Enter password">

<br>

<button onclick="checkLogin()">Login</button>

<p id="message"></p>

</div>

<script>

function checkLogin(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

if(user == "" || pass == "")
{
    document.getElementById("message").innerHTML="Please enter username and password";
}
else if(user == "admin" && pass == "123")
{
    document.getElementById("message").style.color="green";
    document.getElementById("message").innerHTML="Login success";
}
else
{
    document.getElementById("message").innerHTML="Login failed";
}

}

</script>

</body>
</html>
