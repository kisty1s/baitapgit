<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanh Toán</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:360px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

label{
    font-size:14px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin:6px 0 12px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.total{
    font-size:18px;
    font-weight:bold;
    text-align:center;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

.success{
    color:green;
    text-align:center;
    margin-top:10px;
}

.error{
    color:red;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">
    <h2>Payment</h2>

    <div class="total">Total: $49.99</div>

    <form id="paymentForm">

        <label>Full Name</label>
        <input type="text" id="name" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>Card Number</label>
        <input type="text" id="card" maxlength="16" required>

        <label>Expiry Date</label>
        <input type="text" id="expiry" placeholder="MM/YY" required>

        <label>CVV</label>
        <input type="text" id="cvv" maxlength="3" required>

        <button type="submit">Pay Now</button>

    </form>

    <p id="message"></p>
</div>

<script>
document.getElementById("paymentForm").addEventListener("submit", function(e){
    e.preventDefault();

    const card = document.getElementById("card").value;
    const cvv = document.getElementById("cvv").value;
    const message = document.getElementById("message");

    if(card.length !== 16){
        message.className="error";
        message.innerText="Card number must be 16 digits";
        return;
    }

    if(cvv.length !== 3){
        message.className="error";
        message.innerText="CVV must be 3 digits";
        return;
    }

    message.className="success";
    message.innerText="Thanh toán thành công!";
});
</script>

</body>
</html>
