<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Profile Người Dùng</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .profile-card{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            width:300px;
            text-align:center;
        }

        .profile-card img{
            width:100px;
            height:100px;
            border-radius:50%;
            margin-bottom:15px;
        }

        .profile-card h2{
            margin:10px 0;
        }

        .profile-card p{
            color:gray;
            font-size:14px;
        }

        .btn{
            margin-top:15px;
            padding:10px 15px;
            border:none;
            background:#007bff;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        .btn:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

<div class="profile-card">

    <img src="https://via.placeholder.com/100" alt="avatar">

    <h2>Lê Ngọc Vũ</h2>

    <p>Email: vu@example.com</p>
    <p>Sinh viên CNTT</p>

    <button class="btn">Chỉnh sửa hồ sơ</button>

</div>

</body>
</html>
