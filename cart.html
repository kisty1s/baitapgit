<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Giỏ Hàng</title>
<link rel="stylesheet" href="cart.css">
</head>

<body>

<h1>Giỏ Hàng</h1>

<table>
    <tr>
        <th>Sản phẩm</th>
        <th>Giá</th>
        <th>Số lượng</th>
        <th>Tổng</th>
        <th>Xóa</th>
    </tr>

    <tr>
        <td>iPhone 14</td>
        <td>20.000.000đ</td>
        <td><input type="number" value="1"></td>
        <td>20.000.000đ</td>
        <td><button>X</button></td>
    </tr>

    <tr>
        <td>Samsung S23</td>
        <td>18.000.000đ</td>
        <td><input type="number" value="1"></td>
        <td>18.000.000đ</td>
        <td><button>X</button></td>
    </tr>

</table>

<div class="total">
    <h2>Tổng tiền: 38.000.000đ</h2>
    <button class="checkout">Thanh toán</button>
</div>

</body>
</html>
